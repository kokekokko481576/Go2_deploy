/**:
  controller_server:
    ros__parameters:
      use_sim_time: true

      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.5
      min_theta_velocity_threshold: 0.001
      progress_checker_plugins: ["progress_checker"]
      goal_checker_plugins: ["general_goal_checker"]
      controller_plugins: ["FollowPath"]

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0
      general_goal_checker:
        stateful: true
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.25
        yaw_goal_tolerance: 0.2

      # external/go2_ros2_sim_py/gazebo_sim/config/nav2_params.yaml の
      # controller_server.FollowPath(DWB)ブロックを参考値としてそのまま流用
      FollowPath:
        plugin: "dwb_core::DWBLocalPlanner"
        debug_trajectory_details: true
        min_vel_x: 0.0
        min_vel_y: 0.0
        max_vel_x: 0.18
        max_vel_y: 0.0
        max_vel_theta: 0.5
        min_speed_xy: 0.0
        max_speed_xy: 0.18
        min_speed_theta: 0.0
        acc_lim_x: 2.5
        acc_lim_y: 0.0
        acc_lim_theta: 3.2
        decel_lim_x: -2.5
        decel_lim_y: 0.0
        decel_lim_theta: -3.2
        vx_samples: 20
        vy_samples: 5
        vtheta_samples: 20
        sim_time: 1.7
        linear_granularity: 0.05
        angular_granularity: 0.025
        transform_tolerance: 0.2
        xy_goal_tolerance: 0.25
        trans_stopped_velocity: 0.25
        short_circuit_trajectory_evaluation: true
        limit_vel_cmd_in_traj: false
        stateful: true
        critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
        BaseObstacle.scale: 0.02
        PathAlign.scale: 32.0
        GoalAlign.scale: 24.0
        PathAlign.forward_point_distance: 0.1
        GoalAlign.forward_point_distance: 0.1
        PathDist.scale: 32.0
        GoalDist.scale: 24.0
        RotateToGoal.scale: 32.0
        RotateToGoal.slowing_factor: 5.0
        RotateToGoal.lookahead_time: -1.0

  # M2(平地の経路追従)は障害物回避が完了条件に含まれない(計画書M3で扱う)ため、
  # inflation_layerのみの最小構成にする。static_layer/voxel_layerは追M3(Issue #23)で追加
  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: true
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: odom
        robot_base_frame: base_link
        rolling_window: true
        width: 10
        height: 10
        resolution: 0.05
        footprint: "[ [0.35, 0.18], [0.35, -0.18], [-0.38, -0.18], [-0.38, 0.18] ]"
        plugins: ["inflation_layer"]
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 4.0
          inflation_radius: 0.45
        always_send_full_costmap: true

  lifecycle_manager_navigation:
    ros__parameters:
      use_sim_time: true
      autostart: true
      node_names: ["controller_server"]
