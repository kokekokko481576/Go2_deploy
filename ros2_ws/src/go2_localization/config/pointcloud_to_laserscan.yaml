/**:
  pointcloud_to_laserscan:
    ros__parameters:
      use_sim_time: true

      # chin_lidar_frameは実機仮値でpitch=0.35rad(約20°)下向きに傾いているため、
      # 空文字(=センサ自身の傾いた座標系のまま高さで輪切り)にすると水平でない
      # 斜めの面で切ることになり、歩くたびに形が変わる不安定なスキャンになる。
      # base_linkに変換してから輪切りにすることで、傾きを補正する
      target_frame: "base_link"
      transform_tolerance: 0.05

      # 顎LiDARは20°下向き+垂直FOV±15°で全ビームが水平から5〜35°下向きにしかならず、
      # base_link相対±5cmの狭い帯だと遠方の壁がほぼ拾えず自分の脚・床の近距離ノイズ
      # ばかりになっていた(Issue #26)。浅いチャンネルで数m先の壁を拾えるよう
      # min_heightを大きく下げて帯を広げ、range_minで至近距離ノイズを弾く
      min_height: -0.0
      max_height: 0.05

      angle_min: -3.14159265
      angle_max: 3.14159265
      angle_increment: 0.0087
      scan_time: 0.1
      # 脚(0.13〜0.3m)の近距離ノイズを除外(Issue #26)
      range_min: 0.4
      range_max: 30.0
      use_inf: true
      concurrency_level: 1

  # height_slice_vizのみで使う(AMCL本体が使うpointcloud_to_laserscanノードには無関係)。
  # 単純な高さレンジではなく、レイごとの理論上の床到達距離との比較で床を除去する
  # 方式に変更した(Issue #26)。詳細はhigh_slice_viz.pyのdocstring参照
  height_slice_viz:
    ros__parameters:
      use_sim_time: true
      target_frame: "base_link"
      # 床の高さ(target_frame相対)。cafe_worldの平地で静止スキャンした実測値
      # (前方0.5〜2.0mで一貫してz=-0.26〜-0.28だった)から-0.27とした
      floor_z: -0.27
      # 理論上の床到達距離より、これ以上手前で反射していれば障害物とみなすマージン
      floor_margin: 0.1
      # 参考程度の粗い上限(天井反射等の除外用)
      max_height: 0.3
