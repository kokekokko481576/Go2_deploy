/**:
  pointcloud_to_laserscan:
    ros__parameters:
      use_sim_time: true

      # chin_lidar_frameは実機仮値でpitch=0.35rad(約20°)下向きに傾いているため、
      # 空文字(=センサ自身の傾いた座標系のまま高さで輪切り)にすると水平でない
      # 斜めの面で切ることになり、歩くたびに形が変わる不安定なスキャンになる。
      # base_linkに変換してから輪切りにすることで、傾きを補正する
      target_frame: "base_link"
      transform_tolerance: 0.05

      # 顎LiDARの搭載高さ(base_link相対 z=-0.06)を基準に、
      # ±5cmの高さ帯だけを2Dスキャンとして切り出す
      min_height: -0.05
      max_height: 0.05

      angle_min: -3.14159265
      angle_max: 3.14159265
      angle_increment: 0.0087
      scan_time: 0.1
      range_min: 0.1
      range_max: 30.0
      use_inf: true
      concurrency_level: 1
