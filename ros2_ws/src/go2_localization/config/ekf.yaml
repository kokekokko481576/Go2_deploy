/**:
  ekf_filter_node:
    ros__parameters:
      use_sim_time: true

      frequency: 30.0
      sensor_timeout: 0.2
      two_d_mode: true

      # go2_path_following(追M2)のTF参照元として自前のTFを配信する。
      # upstream本家と衝突しないよう、出力先はlaunchファイルで/go2_localization/tfに
      # リマップしている(tf_staticはupstreamの静止TFを読み続けるだけなので変更不要)
      publish_tf: true
      map_frame: map
      odom_frame: odom
      base_link_frame: base_link
      world_frame: odom

      # 本来は脚オドメトリの生値を使うが、simでは前段の生オドメトリが
      # 単独トピックとして公開されていないため、upstream(sim)側が
      # 既に計算済みの /robot1/odometry/filtered を「生の入力」とみなして
      # 自分のEKFにもう一度かける練習とする(launchファイルでraw_odom_inputに
      # リマップする)。
      odom0: raw_odom_input
      odom0_config: [true,  true,  false,
                     false, false, true,
                     true,  true,  false,
                     false, false, true,
                     false, false, false]
      odom0_differential: false
      odom0_relative: false
      odom0_queue_size: 2

      imu0: imu_plugin/out
      imu0_config: [false, false, false,
                    true,  true,  true,
                    false, false, false,
                    true,  true,  true,
                    true,  true,  true]
      imu0_differential: false
      imu0_relative: false
      imu0_queue_size: 5
      imu0_remove_gravitational_acceleration: true
