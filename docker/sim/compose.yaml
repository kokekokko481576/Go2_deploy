# simコンテナ: Gazebo(Harmonic) + Go2モデル + Nav2 (docs/docker要件定義.md §4.1)
# ビルドコンテキストはリポジトリルート(../.. from this file)。
# upstream(go2_ros2_sim_py)はNVIDIA GPU前提だが、本開発機はiGPU(NVIDIA非搭載)のため
# GPU予約はせず /dev/dri を渡す構成を既定にする(要件定義 R4)。
# NVIDIA環境で使う場合は下部の deploy.resources をコメントアウトして有効化する。
services:
  sim:
    build:
      context: ../..
      dockerfile: docker/sim/Dockerfile
    image: go2-sim:jazzy
    container_name: go2-sim
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID=0
      - GZ_SIM_RESOURCE_PATH=/root/ws/src/gazebo_sim/models
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    devices:
      - /dev/dri:/dev/dri
    # SIM_ENABLE_NAV2=false でupstream Nav2スタックを起動しない(GATE1計測用、Issue #35)。
    # SIM_GUI=false で Gazebo をヘッドレス(server only)起動しGUI窓の描画負荷を止める(#44。
    #   自律スタック+RViz同時起動で重い時に、可視化をRViz一本に寄せる用途)。
    # 例: SIM_ENABLE_NAV2=false SIM_GUI=false docker compose up -d
    # 未指定なら従来どおり全て有効。戻すときは普通に docker compose up -d (再作成される)
    # 末尾のフィルタは、Humble(dev)⇔Jazzy(sim)混在で全ノードが出し続ける無害な
    # type hash警告(issue #7)を docker logs から間引くもの。実エラーはそのまま流れる。
    # launchは子ノードのstderrを自分のstdoutへ多重化するため 2>&1 でまとめて濾す
    command: >
      bash -c "source install/setup.bash &&
      ros2 launch gazebo_sim launch.py use_sim_time:=true
      enable_nav2:=${SIM_ENABLE_NAV2:-true} enable_rviz:=${SIM_ENABLE_RVIZ:-true}
      gui:=${SIM_GUI:-true}
      2>&1 | grep --line-buffered -vE
      'Failed to parse type hash|sequence size exceeds remaining buffer'"
    # --- NVIDIA GPU機で使う場合(nvidia-container-toolkit導入後、上のdevices/commandは共存可) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, graphics, utility, compute, video]
