services:
  ros2:
    build: .
    image: arbeit-ros2:humble
    container_name: arbeit-ros2
    # ros2_ws はホスト側(リポジトリ直下)に置き、コンテナを消してもコードが残るようにする
    volumes:
      - ../ros2_ws:/home/ros/ros2_ws
      # --- Ubuntu で GUI を使う場合(ネイティブX11) ---
      - /tmp/.X11-unix:/tmp/.X11-unix
    devices:
      # --- iGPU(/dev/dri)をコンテナに渡す。NVIDIA不要、GPU非力機のGazebo/RViz2描画支援用 ---
      - /dev/dri:/dev/dri
    environment:
      # [Ubuntu] ネイティブX11。ホストで事前に `xhost +local:docker` を実行しておく(docker/README.md 参照)
      - DISPLAY=${DISPLAY}
      # [Mac] GUI(RViz/Gazebo)は XQuartz 経由。上のDISPLAY行をコメントアウトし、
      #   xhost +localhost を実行してから次を有効化する
      # - DISPLAY=host.docker.internal:0
      - QT_X11_NO_MITSHM=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID=0
    stdin_open: true
    tty: true
    command: bash
    # 実機Go2(有線LAN・DDS)と通信する場合や、Ubuntuネイティブでの利用はホストネットワークを使う(推奨)。
    # [Mac] Docker Desktop 4.34以降 + 設定で "Enable host networking" を有効化が必要
    network_mode: host
    # --- Ubuntu + NVIDIA GPU 機で描画を速くする場合(nvidia-container-toolkit 導入後) ---
    # gpus: all
